<div class="max-w-xl mx-auto mt-10 p-8 bg-white shadow-xl rounded-xl border-t-8 border-purple-900">

  <h1 class="text-2xl font-black text-gray-800 mb-6">Novo Funcionário</h1>

  <div class="space-y-4">

    <div *ngIf="isSuperAdmin" class="bg-yellow-50 p-4 rounded border border-yellow-200 mb-4">
      <label class="block text-sm font-bold text-yellow-800 mb-1">🏫 Escola de Destino (Modo Superadmin)</label>
      <select [(ngModel)]="usuario.escola_id"
        class="w-full p-3 border-2 border-yellow-300 rounded bg-white text-gray-800 font-bold">
        <option [ngValue]="null">-- Selecione a Escola --</option>
        @for (escola of escolas; track escola.id) {
        <option [value]="escola.id">{{ escola.nome }}</option>
        }
      </select>
      <p class="text-xs text-yellow-600 mt-1">Obrigatório para criar Diretores, Professores ou Secretária.</p>
    </div>

    <div>
      <label class="block text-sm font-bold text-gray-700 mb-1">Nome Completo</label>
      <input [(ngModel)]="usuario.nome" type="text" class="w-full p-3 border rounded focus:border-purple-500 font-bold">
    </div>

    <div>
      <label class="block text-sm font-bold text-gray-700 mb-1">Email (Login)</label>
      <input [(ngModel)]="usuario.email" type="email" class="w-full p-3 border rounded focus:border-purple-500">
    </div>

    <div>
      <label class="block text-sm font-bold text-gray-700 mb-1">Senha Inicial</label>
      <input [(ngModel)]="usuario.senha" type="password" class="w-full p-3 border rounded focus:border-purple-500">
    </div>

    <div>
      <label class="block text-sm font-bold text-gray-700 mb-1">Perfis de Acesso (pode selecionar vários)</label>
      <div class="space-y-2 border rounded p-3">
        @for (role of rolesDisponiveis; track role.id) {
        <label class="flex items-center gap-2">
          <input type="checkbox" [value]="role.id" (change)="toggleRole(role.id, $event)">
          {{ role.name }}
        </label>
        }
      </div>
    </div>

    <button (click)="salvar()"
      class="w-full bg-purple-900 text-white font-bold py-3 rounded shadow-lg hover:bg-purple-800 transition mt-4">
      Criar Conta
    </button>
  </div>
</div>
