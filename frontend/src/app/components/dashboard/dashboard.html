<div class="p-6 fade-in">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold text-gray-800">
      Dashboard <span *ngIf="data()" class="text-sm font-normal text-gray-500 capitalize">({{ data()?.perfil }})</span>
    </h2>
    <button (click)="carregarDados()" class="text-blue-600 hover:text-blue-800 text-sm">
      <span class="material-icons-outlined align-middle">refresh</span> Atualizar
    </button>
  </div>

  <div *ngIf="carregando" class="flex justify-center h-64 items-center">
    <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600"></div>
  </div>

  <div *ngIf="erro" class="bg-red-100 text-red-700 p-4 rounded mb-4">
    {{ erro }}
  </div>

  <div *ngIf="data() && !carregando">

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
      <div *ngFor="let card of data()?.cards"
           class="bg-white rounded-lg shadow-sm p-6 border-l-4 transition-transform hover:scale-105"
           [ngClass]="{
             'border-blue-500': card.cor === 'blue',
             'border-green-500': card.cor === 'green',
             'border-purple-500': card.cor === 'purple',
             'border-indigo-500': card.cor === 'indigo',
             'border-teal-500': card.cor === 'teal',
             'border-orange-500': card.cor === 'orange',
             'border-red-500': card.cor === 'red'
           }">
        <div class="flex justify-between items-start">
          <div>
            <p class="text-xs font-medium text-gray-500 uppercase tracking-wider">{{ card.titulo }}</p>
            <p class="mt-2 text-2xl font-semibold text-gray-900">{{ card.valor }}</p>
          </div>
          <div class="p-2 rounded-full bg-gray-50 text-gray-400">
            <span class="material-icons-outlined">{{ card.icon }}</span>
          </div>
        </div>
      </div>
    </div>

    <div class="bg-white p-6 rounded-lg shadow-sm" *ngIf="data()?.graficos?.principal?.length">
      <h3 class="text-lg font-semibold mb-4 text-gray-700">Estatísticas</h3>

      <div *ngIf="data()?.graficos?.tipo === 'pie'" class="h-75">
        <ngx-charts-pie-chart
          [results]="data()?.graficos?.principal"
          [scheme]="colorScheme"
          [doughnut]="true"
          [legend]="true"
          [labels]="true">
        </ngx-charts-pie-chart>
      </div>

      <div *ngIf="data()?.graficos?.tipo === 'bar'" class="h-75">
        <ngx-charts-bar-vertical
          [results]="data()?.graficos?.principal"
          [scheme]="colorScheme"
          [xAxis]="true"
          [yAxis]="true"
          [showXAxisLabel]="true"
          [showYAxisLabel]="true">
        </ngx-charts-bar-vertical>
      </div>
    </div>

  </div>
</div>
