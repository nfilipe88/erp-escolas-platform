<ng-container *ngIf="!user()">
  <router-outlet></router-outlet>
</ng-container>

<div *ngIf="user()" class="min-h-screen bg-gray-100 flex">

  <aside class="bg-slate-800 text-white w-64 shrink-0 hidden md:flex flex-col transition-all duration-300">
    <div class="h-16 flex items-center justify-center border-b border-slate-700 font-bold text-xl tracking-wider">
      ERP ESCOLAR
    </div>

    <nav class="flex-1 overflow-y-auto py-4">
      <ul class="space-y-1">
        <li *ngFor="let menu of menus()">
          <a [routerLink]="menu.route"
             routerLinkActive="bg-slate-700 border-l-4 border-blue-500"
             class="flex items-center px-6 py-3 hover:bg-slate-700 transition-colors cursor-pointer">
            <span class="material-icons-outlined mr-3 text-lg">{{ menu.icon }}</span>
            <span>{{ menu.label }}</span>
          </a>
        </li>
      </ul>
    </nav>

    <div class="p-4 border-t border-slate-700 text-sm text-slate-400">
      <p>Olá, {{ user()?.nome }}</p>
      <p class="text-xs uppercase mt-1 text-slate-500">{{ user()?.perfil }}</p>
    </div>
  </aside>

  <div class="flex-1 flex flex-col">

    <header class="h-16 bg-white shadow-sm flex items-center justify-between px-6">
      <h1 class="text-lg font-semibold text-gray-700">Sistema de Gestão</h1>

      <div class="flex items-center gap-4">
        <button (click)="logout()" class="text-gray-500 hover:text-red-600 font-medium text-sm flex items-center gap-2">
          Sair
          <span class="material-icons-outlined">logout</span>
        </button>
      </div>
    </header>

    <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
